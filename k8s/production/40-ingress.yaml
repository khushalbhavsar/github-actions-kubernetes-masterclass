apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skillpulse
  namespace: skillpulse
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: skillpulse.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

