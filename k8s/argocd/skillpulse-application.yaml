apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skillpulse
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: skillpulse
  source:
    repoURL: https://github.com/LondheShubham153/github-actions-kubernetes-masterclass.git
    targetRevision: main
    path: k8s
    directory:
      recurse: false
      include: '{00-namespace.yaml,10-mysql.yaml,20-backend.yaml,30-frontend.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: skillpulse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  revisionHistoryLimit: 10
