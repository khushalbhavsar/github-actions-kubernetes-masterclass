apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skillpulse-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: skillpulse
  source:
    repoURL: https://github.com/LondheShubham153/github-actions-kubernetes-masterclass.git
    targetRevision: main
    path: k8s/monitoring
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  revisionHistoryLimit: 10
