name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'terraform/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  code-quality-security:
    name: Code Quality & Security Checks
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # ----------------------------
      # Checkout Repository
      # ----------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # Install Go
      # ----------------------------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # ----------------------------
      # Install Terraform
      # ----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ----------------------------
      # Install kubectl
      # ----------------------------
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # ----------------------------
      # Install Trivy
      # ----------------------------
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      # ----------------------------
      # Verify Installed Tools
      # ----------------------------
      - name: Verify Tool Versions
        run: |
          go version
          terraform version
          kubectl version --client
          trivy --version
          docker --version

      # ----------------------------
      # GitLeaks Secret Scan
      # ----------------------------
      - name: GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # ----------------------------
      # SonarQube SAST Scan
      # ----------------------------
      - name: SonarQube SAST Scan
        if: ${{ vars.SONAR_ENABLED == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      # ----------------------------
      # Terraform Validation
      # ----------------------------
      - name: Terraform Format Check
        working-directory: terraform/aws
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform/aws
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/aws
        run: terraform validate

      # ----------------------------
      # Kubernetes Manifest Validation
      # ----------------------------
      - name: Validate Kubernetes Manifests
        run: |
          kubectl apply --dry-run=client --validate=false -f k8s/00-namespace.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/10-mysql.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/20-backend.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/30-frontend.yaml

      # ----------------------------
      # Trivy Filesystem Scan
      # ----------------------------
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # ----------------------------
      # Trivy Config Scan
      # ----------------------------
      - name: Trivy Kubernetes/Terraform Config Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

      # ----------------------------
      # Run Backend Tests
      # ----------------------------
      - name: Run Backend Unit Tests
        run: |
          cd backend
          go test ./...

  build-and-push:
    name: Build, Scan, and Push Images
    needs: code-quality-security
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout Repository
      # ----------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------------
      # Setup Docker Buildx
      # ----------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------
      # Install Trivy
      # ----------------------------
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      # ----------------------------
      # Build Backend Image
      # ----------------------------
      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: skillpulse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------
      # Scan Backend Image
      # ----------------------------
      - name: Trivy Backend Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: skillpulse-backend:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # ----------------------------
      # Build Frontend Image
      # ----------------------------
      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: skillpulse-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------
      # Scan Frontend Image
      # ----------------------------
      - name: Trivy Frontend Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: skillpulse-frontend:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # ----------------------------
      # Docker Hub Login
      # ----------------------------
      - name: Docker Hub Login
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----------------------------
      # Push Backend Image
      # ----------------------------
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------
      # Push Frontend Image
      # ----------------------------
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
